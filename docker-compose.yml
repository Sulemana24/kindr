# Kindr + PostgreSQL — local or server deploy
#
# Usage:
#   docker compose up --build
#   Open http://127.0.0.1:5000
#
# Set SECRET_KEY and other secrets in .env (see .env.example).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kindr
      POSTGRES_PASSWORD: kindr
      POSTGRES_DB: kindr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kindr -d kindr"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://kindr:kindr@db:5432/kindr
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - campaign_uploads:/app/kindr_app/static/uploads

volumes:
  postgres_data:
  campaign_uploads:
